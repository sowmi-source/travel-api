apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: travel-api-ingress
  namespace: travel
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - travel.local
      secretName: tls-secret
  rules:
    - host: travel.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: travel-api-service
                port:
                  number: 443
